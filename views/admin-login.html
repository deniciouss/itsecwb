<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Login • SamgyupGrill</title>
  <link rel="stylesheet" href="/public/css/theme.css">

  <!-- Google reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body class="grill-bg">

  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <div class="logo"></div>
        <div>Samgyup<span style="color:var(--ember)">Grill</span></div>
      </a>
    </div>
  </header>

  <main class="container">
    <section class="card card-pad" style="max-width:520px; margin: 80px auto;">
      
      <div class="form-title">Administrator Login</div>
      <div class="form-sub">Restricted access — authorized personnel only</div>

      <!-- Error Box -->
      <div id="errorBox"
           style="display:none; color:var(--ember); padding:12px;
                  background:#fee2e2; border-radius:10px; margin:16px 0;">
        Login failed
      </div>

      <form id="adminLoginForm" class="form">

        <!-- Email -->
        <div class="field">
          <div class="label">Email</div>
          <input
            class="input"
            type="email"
            name="email"
            placeholder="admin@example.com"
            required
            autocomplete="email"
            maxlength="254"
          />
        </div>

        <!-- Password -->
        <div class="field">
          <div class="label">Password</div>
          <input
            class="input"
            type="password"
            name="password"
            placeholder="••••••••"
            required
            minlength="8"
            maxlength="128"
            autocomplete="current-password"
          />
        </div>

        <!-- CAPTCHA -->
        <div class="field">
          <div class="label">Human Verification</div>
          <div class="g-recaptcha"
               data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI">
          </div>
          <div id="captchaError"
               style="display:none; color:var(--ember); margin-top:6px;">
            Please complete the CAPTCHA.
          </div>
        </div>

        <button class="btn btn-primary" type="submit">
          Sign in as Administrator
        </button>

      </form>

      <!-- Go Back Button -->
      <div style="margin-top:22px; text-align:center;">
        <a href="/login" class="btn btn-ghost" style="display:inline-block;">
          ← Go back to User Login
        </a>
        <div style="font-size:12px; opacity:.7; margin-top:8px;">
          Only authorized admin accounts can access the admin panel.
        </div>
      </div>

    </section>
  </main>

  <footer class="footer">ITSECWB</footer>

  <script>
    const form = document.getElementById("adminLoginForm");
    const errorBox = document.getElementById("errorBox");
    const captchaError = document.getElementById("captchaError");

    function getCaptchaToken() {
      const el = document.querySelector('[name="g-recaptcha-response"]');
      return (el && el.value) ? el.value : "";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorBox.style.display = "none";
      captchaError.style.display = "none";

      const email = form.email.value.trim();
      const password = form.password.value.trim();
      const captchaToken = getCaptchaToken();

      if (!captchaToken) {
        captchaError.style.display = "block";
        return;
      }

      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, captchaToken })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          errorBox.textContent = data.error || "Invalid credentials";
          errorBox.style.display = "block";
          if (window.grecaptcha) { try { grecaptcha.reset(); } catch(_){} }
          return;
        }

        window.location.href = "/admin/dashboard";

      } catch (err) {
        errorBox.textContent = "Unable to connect. Please try again.";
        errorBox.style.display = "block";
        if (window.grecaptcha) { try { grecaptcha.reset(); } catch(_){} }
      }
    });
  </script>

</body>
</html>
