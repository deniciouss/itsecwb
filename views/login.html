<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login • SamgyupGrill</title>
  <link rel="stylesheet" href="/public/css/theme.css">
</head>

<body class="grill-bg">
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <div class="logo"></div>
        <div>Samgyup<span style="color:var(--ember)">Grill</span></div>
      </a>

      <nav class="nav-links">
        <a href="/branches">Branches</a>
        <a href="/menu">Menu</a>
        <a href="/reserve">Reserve</a>
        <a href="/track">Track</a>
        <a class="btn btn-ghost" href="/login">Login</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card card-pad" style="max-width:680px; margin: 0 auto;">
      <div class="form-title">Welcome back</div>
      <div class="form-sub">Sign in to SamgyupGrill</div>

      <!-- Error message for invalid login -->
      <div id="loginError" class="help error" style="display:none; color:var(--ember); padding:12px; background:#fee2e2; border-radius:4px; margin-bottom:16px; margin-top:16px;">
        Invalid email/password combination
      </div>

      <form class="form" id="loginForm">
        <div class="field">
          <div class="label">Email</div>
          <input
            class="input"
            type="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
            maxlength="254"
          />
          <div class="help error" id="emailError" style="display:none; color:var(--ember);">
            Please enter a valid email address
          </div>
        </div>

        <div class="field">
          <div class="label">Password</div>
          <input
            class="input"
            type="password"
            name="password"
            placeholder="••••••••"
            required
            minlength="8"
            maxlength="128"
            autocomplete="current-password"
          />
          <div class="help error" id="passwordError" style="display:none; color:var(--ember);">
            Password must be at least 8 characters
          </div>
        </div>

        <button class="btn btn-primary" type="submit" style="padding:12px 16px;">
          Sign in
        </button>

        <div class="help">
          New here?
          <a href="/register" style="color:var(--ember); font-weight:900; text-decoration:none;">Create an account</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">ITSECWB</footer>

  <script>
    // ========================================
    // TOAST (for verify / verified banners)
    // ========================================
    const params = new URLSearchParams(window.location.search);

    function showToast(title, msg) {
      const wrapId = "toastWrap";
      let wrap = document.getElementById(wrapId);

      if (!wrap) {
        wrap = document.createElement("div");
        wrap.id = wrapId;
        wrap.style.position = "fixed";
        wrap.style.top = "76px";
        wrap.style.right = "18px";
        wrap.style.zIndex = "9999";
        wrap.style.display = "grid";
        wrap.style.gap = "10px";
        wrap.style.width = "min(420px, calc(100vw - 36px))";
        document.body.appendChild(wrap);
      }

      const toast = document.createElement("div");
      toast.style.display = "flex";
      toast.style.gap = "12px";
      toast.style.alignItems = "flex-start";
      toast.style.padding = "14px 14px";
      toast.style.borderRadius = "16px";
      toast.style.border = "1px solid rgba(16,185,129,.22)";
      toast.style.background = "rgba(16,185,129,.10)";
      toast.style.boxShadow = "0 18px 45px rgba(2,6,23,.12)";

      toast.innerHTML = `
        <div style="
          width:34px;height:34px;border-radius:12px;display:grid;place-items:center;
          background:rgba(16,185,129,.16);border:1px solid rgba(16,185,129,.22);
          font-weight:900;color:rgba(5,150,105,.95);flex:0 0 auto;
        ">✓</div>
        <div>
          <div style="font-weight:900;margin:0;">${title}</div>
          <div style="margin-top:2px;color:rgba(31,41,55,.78);font-weight:650;">${msg}</div>
        </div>
        <button aria-label="Close" style="
          margin-left:auto;background:transparent;border:none;cursor:pointer;
          color:rgba(31,41,55,.55);font-weight:900;padding:2px 6px;border-radius:10px;
        ">✕</button>
      `;

      toast.querySelector("button").addEventListener("click", () => toast.remove());
      wrap.appendChild(toast);

      setTimeout(() => { if (toast.isConnected) toast.remove(); }, 4500);
    }

    // Show toast based on query params
    if (params.get("verify") === "1") {
      showToast("Check your email 📩", "We sent a verification link. Verify before logging in.");
      history.replaceState({}, "", "/login");
    }
    if (params.get("verified") === "1") {
      showToast("Email verified ✅", "Your account is activated. You can now log in.");
      history.replaceState({}, "", "/login");
    }

    // ========================================
    // STRICT EMAIL VALIDATION (for UX)
    // ========================================
    function isValidEmail(email) {
      const emailRegex = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/;
      return emailRegex.test(email) && email.length <= 254;
    }

    // ========================================
    // LOGIN FORM HANDLER
    // ========================================
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      // Hide all error messages
      document.getElementById('emailError').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';
      document.getElementById('loginError').style.display = 'none';

      const formData = new FormData(this);

      let email = (formData.get('email') || '').trim();
      let password = (formData.get('password') || '').trim();

      // Client-side validation (UX only)
      if (!email) {
        document.getElementById('emailError').textContent = 'Email is required';
        document.getElementById('emailError').style.display = 'block';
        return;
      }

      if (!password) {
        document.getElementById('passwordError').textContent = 'Password is required';
        document.getElementById('passwordError').style.display = 'block';
        return;
      }

      if (!isValidEmail(email)) {
        document.getElementById('emailError').textContent = 'Please enter a valid email address';
        document.getElementById('emailError').style.display = 'block';
        return;
      }

      if (password.length < 8) {
        document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
        document.getElementById('passwordError').style.display = 'block';
        return;
      }

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const result = await res.json().catch(() => ({}));

        if (!res.ok) {
          // IP rate-limited
          if (res.status === 429) {
            document.getElementById('loginError').textContent =
              "Too many login attempts. Please try again in 15 minutes.";
          }
          // EMAIL account locked
          else if (res.status === 423) {
            document.getElementById('loginError').textContent =
              "This account is temporarily locked due to too many failed attempts. Please try again later.";
          }
          // Not verified
          else if (res.status === 403 && result.error) {
            document.getElementById('loginError').textContent = result.error;
          }
          // Generic invalid creds
          else {
            document.getElementById('loginError').textContent =
              "Invalid email/password combination";
          }

          document.getElementById('loginError').style.display = 'block';
          return;
        }

        // Validate response
        if (!result.user || !result.user.user_id) {
          document.getElementById('loginError').textContent =
            "Invalid email/password combination";
          document.getElementById('loginError').style.display = 'block';
          return;
        }

        const user = result.user;
        localStorage.setItem("user", JSON.stringify(user));
        localStorage.setItem("user_id", user.user_id);

        window.location.href = "/welcome";

      } catch (err) {
        console.error("Login error:", err);
        document.getElementById('loginError').textContent =
          "Unable to connect. Please try again.";
        document.getElementById('loginError').style.display = 'block';
      }
    });
  </script>

</body>
</html>
