<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login • SamgyupGrill</title>
  <link rel="stylesheet" href="/public/css/theme.css">
</head>

<body class="grill-bg">
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <div class="logo"></div>
        <div>Samgyup<span style="color:var(--ember)">Grill</span></div>
      </a>

      <nav class="nav-links">
        <a href="/branches">Branches</a>
        <a href="/menu">Menu</a>
        <a href="/reserve">Reserve</a>
        <a href="/track">Track</a>
        <a class="btn btn-ghost" href="/login">Login</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card card-pad" style="max-width:680px; margin: 0 auto;">
      <div class="form-title">Welcome back</div>
      <div class="form-sub">Sign in to SamgyupGrill</div>

      <!-- Error message for invalid login -->
      <div id="loginError" class="help error" style="display:none; color:var(--ember); padding:12px; background:#fee2e2; border-radius:4px; margin-bottom:16px; margin-top:16px;">
        Invalid email/password combination
      </div>

      <form class="form" id="loginForm">
        <div class="field">
          <div class="label">Email</div>
          <input 
            class="input" 
            type="email" 
            name="email" 
            placeholder="you@example.com" 
            required 
            autocomplete="email"
            maxlength="254"
          />
          <div class="help error" id="emailError" style="display:none; color:var(--ember);">
            Please enter a valid email address
          </div>
        </div>

        <div class="field">
          <div class="label">Password</div>
          <input 
            class="input" 
            type="password" 
            name="password" 
            placeholder="••••••••" 
            required 
            minlength="8"
            maxlength="128"
            autocomplete="current-password"
          />
          <div class="help error" id="passwordError" style="display:none; color:var(--ember);">
            Password must be at least 8 characters
          </div>
        </div>

        <button class="btn btn-primary" type="submit" style="padding:12px 16px;">
          Sign in
        </button>

        <div class="help">
          New here?
          <a href="/register" style="color:var(--ember); font-weight:900; text-decoration:none;">Create an account</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">ITSECWB</footer>

  <script>
    // ========================================
    // STRICT EMAIL VALIDATION (for UX)
    // ========================================
    function isValidEmail(email) {
      const emailRegex = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/;
      return emailRegex.test(email) && email.length <= 254;
    }

    // ========================================
    // LOGIN FORM HANDLER
    // ========================================
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      // Hide all error messages
      document.getElementById('emailError').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';
      document.getElementById('loginError').style.display = 'none';

      const formData = new FormData(this);
      
      // Get values and trim whitespace only (NO sanitization)
      let email = formData.get('email');
      let password = formData.get('password');

      email = email ? email.trim() : '';
      password = password ? password.trim() : '';

      // ========================================
      // CLIENT-SIDE VALIDATION (UX ONLY)
      // ========================================

      // 1. Check if empty
      if (!email) {
        document.getElementById('emailError').textContent = 'Email is required';
        document.getElementById('emailError').style.display = 'block';
        return;
      }

      if (!password) {
        document.getElementById('passwordError').textContent = 'Password is required';
        document.getElementById('passwordError').style.display = 'block';
        return;
      }

      // 2. STRICT EMAIL VALIDATION (helps users catch typos)
      if (!isValidEmail(email)) {
        document.getElementById('emailError').textContent = 'Please enter a valid email address';
        document.getElementById('emailError').style.display = 'block';
        return;
      }

      // 3. Password length check (helps users)
      if (password.length < 8) {
        document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
        document.getElementById('passwordError').style.display = 'block';
        return;
      }

      // ========================================
      // SEND DATA EXACTLY AS ENTERED
      // Backend handles all security validation
      // ========================================

      try {
        const res = await fetch("http://localhost:3000/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            email: email,      // Trimmed only, not sanitized
            password: password // NEVER sanitize passwords!
          }),
        });

        const result = await res.json();

        // Always show generic error message
        if (!res.ok) {
          console.error("Login failed:", result);
          document.getElementById('loginError').textContent = "Invalid email/password combination";
          document.getElementById('loginError').style.display = 'block';
          return;
        }

        // Validate response structure
        if (!result.user || !result.user.user_id) {
          console.error("Invalid response structure:", result);
          document.getElementById('loginError').textContent = "Invalid email/password combination";
          document.getElementById('loginError').style.display = 'block';
          return;
        }

        // Store user data
        const user = result.user;
        localStorage.setItem("user", JSON.stringify(user));
        localStorage.setItem("user_id", user.user_id);

        // Redirect to welcome page
        window.location.href = "/welcome";

      } catch (err) {
        console.error("Login error:", err);
        document.getElementById('loginError').textContent = "Unable to connect. Please try again.";
        document.getElementById('loginError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
