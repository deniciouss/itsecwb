<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login • SamgyupGrill</title>
  <link rel="stylesheet" href="/public/css/theme.css">
</head>

<body class="grill-bg">
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <div class="logo"></div>
        <div>Samgyup<span style="color:var(--ember)">Grill</span></div>
      </a>

      <nav class="nav-links">
        <a href="/branches">Branches</a>
        <a href="/menu">Menu</a>
        <a href="/reserve">Reserve</a>
        <a href="/track">Track</a>
        <a class="btn btn-ghost" href="/login">Login</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card card-pad" style="max-width:680px; margin: 0 auto;">
      <div class="form-title">Welcome back</div>
      <div class="form-sub">Sign in to SamgyupGrill</div>

      <form class="form" id="loginForm">
        <div class="field">
          <div class="label">Email</div>
          <input 
            class="input" 
            type="email" 
            name="email" 
            placeholder="you@example.com" 
            required 
          />
          <div class="help error" id="emailError" style="display:none; color:var(--ember);">
            Email is required
          </div>
        </div>

        <div class="field">
          <div class="label">Password</div>
          <input 
            class="input" 
            type="password" 
            name="password" 
            placeholder="••••••••" 
            required 
            minlength="6"
          />
          <div class="help error" id="passwordError" style="display:none; color:var(--ember);">
            Enter at least 6 characters
          </div>
        </div>

        <button class="btn btn-primary" type="submit" style="padding:12px 16px;">
          Sign in
        </button>

        <div class="help">
          New here? <a href="/register" style="color:var(--ember); font-weight:900; text-decoration:none;">Create an account</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">ITSECWB</footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // Clear previous errors
      document.getElementById('emailError').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';
      
      const formData = new FormData(this);
      const data = {
        email: formData.get('email'),
        password: formData.get('password')
      };
      
      // Basic validation
      if (!data.email) {
        document.getElementById('emailError').style.display = 'block';
        return;
      }
      if (!data.password || data.password.length < 6) {
        document.getElementById('passwordError').style.display = 'block';
        return;
      }
      
      try {
        const res = await fetch("http://localhost:3000/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        
        const result = await res.json();
        
        if (!res.ok) {
          alert(result.error || "Login failed");
          return;
        }
        
        // Save user info
        const user = result.user;
        localStorage.setItem("user", JSON.stringify(user));
        localStorage.setItem("user_id", user.user_id);
        localStorage.setItem("role_id", user.role_id);
        
        alert(`Welcome back, ${user.full_name}!`);
        window.location.href = "/welcome";
        
      } catch (err) {
        console.error("Login error:", err);
        alert("Error connecting to the server.");
      }
    });
  </script>
</body>
</html>
