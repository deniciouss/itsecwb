<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login • SamgyupGrill</title>
  <link rel="stylesheet" href="/public/css/theme.css">

  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body class="grill-bg">
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <div class="logo"></div>
        <div>Samgyup<span style="color:var(--ember)">Grill</span></div>
      </a>

      <nav class="nav-links">
        <a href="/branches">Branches</a>
        <a href="/menu">Menu</a>
        <a href="/reserve">Reserve</a>
        <a href="/track">Track</a>
        <a class="btn btn-ghost" href="/login">Login</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card card-pad" style="max-width:680px; margin: 0 auto;">
      <div class="form-title">Welcome back</div>
      <div class="form-sub">Sign in to SamgyupGrill</div>

      <div id="loginError"
           class="help error"
           style="display:none; color:var(--ember); padding:12px; background:#fee2e2; border-radius:10px; margin:16px 0; white-space:pre-wrap; line-height:1.5; font-family:inherit;">
        Login failed
      </div>

      <form class="form" id="loginForm">
        <div class="field">
          <div class="label">Email</div>
          <input
            class="input"
            type="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
            maxlength="254"
          />
          <div class="help error" id="emailError" style="display:none; color:var(--ember); margin-top:6px;">
            Please enter a valid email address
          </div>
        </div>

        <div class="field">
          <div class="label">Password</div>
          <input
            class="input"
            type="password"
            name="password"
            placeholder="••••••••"
            required
            minlength="8"
            maxlength="128"
            autocomplete="current-password"
          />
          <div class="help error" id="passwordError" style="display:none; color:var(--ember); margin-top:6px;">
            Password must be at least 8 characters
          </div>
        </div>

        <div class="field">
          <div class="label">Human Check</div>
          <div class="help">Please complete the verification.</div>

          <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>

          <div class="help error" id="captchaError" style="display:none; color:var(--ember); margin-top:6px;">
            Please complete the CAPTCHA.
          </div>
        </div>

        <button class="btn btn-primary" type="submit" style="padding:12px 16px;">
          Sign in
        </button>

        <div class="help">
          New here?
          <a href="/register" style="color:var(--ember); font-weight:900; text-decoration:none;">Create an account</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">ITSECWB</footer>

  <script>
    const params = new URLSearchParams(window.location.search);

    function showToast(title, msg) {
      const wrapId = "toastWrap";
      let wrap = document.getElementById(wrapId);

      if (!wrap) {
        wrap = document.createElement("div");
        wrap.id = wrapId;
        wrap.style.position = "fixed";
        wrap.style.top = "76px";
        wrap.style.right = "18px";
        wrap.style.zIndex = "9999";
        wrap.style.display = "grid";
        wrap.style.gap = "10px";
        wrap.style.width = "min(420px, calc(100vw - 36px))";
        document.body.appendChild(wrap);
      }

      const toast = document.createElement("div");
      toast.style.display = "flex";
      toast.style.gap = "12px";
      toast.style.alignItems = "flex-start";
      toast.style.padding = "14px 14px";
      toast.style.borderRadius = "16px";
      toast.style.border = "1px solid rgba(16,185,129,.22)";
      toast.style.background = "rgba(16,185,129,.10)";
      toast.style.boxShadow = "0 18px 45px rgba(2,6,23,.12)";

      toast.innerHTML = `
        <div style="
          width:34px;height:34px;border-radius:12px;display:grid;place-items:center;
          background:rgba(16,185,129,.16);border:1px solid rgba(16,185,129,.22);
          font-weight:900;color:rgba(5,150,105,.95);flex:0 0 auto;
        ">✓</div>
        <div>
          <div style="font-weight:900;margin:0;">${title}</div>
          <div style="margin-top:2px;color:rgba(31,41,55,.78);font-weight:650;">${msg}</div>
        </div>
        <button aria-label="Close" style="
          margin-left:auto;background:transparent;border:none;cursor:pointer;
          color:rgba(31,41,55,.55);font-weight:900;padding:2px 6px;border-radius:10px;
        ">✕</button>
      `;

      toast.querySelector("button").addEventListener("click", () => toast.remove());
      wrap.appendChild(toast);

      setTimeout(() => { if (toast.isConnected) toast.remove(); }, 4500);
    }

    if (params.get("verify") === "1") {
      showToast("Check your email 📩", "We sent a verification link. Verify before logging in.");
      history.replaceState({}, "", "/login");
    }
    if (params.get("verified") === "1") {
      showToast("Email verified ✅", "Your account is activated. You can now log in.");
      history.replaceState({}, "", "/login");
    }

    function isValidEmail(email) {
      const cleanEmail = (email || "").trim();

      if (!cleanEmail || cleanEmail.length > 254) return false;

      const atIndex = cleanEmail.lastIndexOf("@");
      if (atIndex <= 0 || atIndex !== cleanEmail.indexOf("@")) return false;

      const localPart = cleanEmail.slice(0, atIndex);
      const domainPart = cleanEmail.slice(atIndex + 1);

      if (!localPart || !domainPart) return false;
      if (localPart.length > 64) return false;
      if (domainPart.length > 255) return false;

      const localRegex = /^(?!.*\.\.)[A-Za-z0-9](?:[A-Za-z0-9.!#$%&'*+/=?^_`{|}~-]{0,62}[A-Za-z0-9])?$/;
      const domainRegex = /^(?=.{1,255}$)(?:[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])$/;

      return localRegex.test(localPart) && domainRegex.test(domainPart);
    }

    function getCaptchaToken() {
      const el = document.querySelector('[name="g-recaptcha-response"]');
      return (el && el.value) ? el.value : "";
    }

    function hideLoginErrors() {
      document.getElementById('emailError').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';
      document.getElementById('captchaError').style.display = 'none';
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('loginError').textContent = 'Login failed';
    }

    function showLoginError(message) {
      const box = document.getElementById('loginError');
      box.textContent = message || "Login failed";
      box.style.display = 'block';
    }

    function formatServerError(result, fallbackMessage) {
      const base = (result && result.error) ? result.error : fallbackMessage;

      if (result && result.stack) {
        return `${base}\n\n${result.stack}`;
      }

      return base;
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      hideLoginErrors();

      const formData = new FormData(this);
      let email = (formData.get('email') || '').trim();
      let password = String(formData.get('password') || '');

      if (!email || !isValidEmail(email)) {
        document.getElementById('emailError').style.display = 'block';
        return;
      }

      if (!password || password.length < 8) {
        document.getElementById('passwordError').style.display = 'block';
        return;
      }

      const captchaToken = getCaptchaToken();
      if (!captchaToken) {
        document.getElementById('captchaError').style.display = 'block';
        return;
      }

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, captchaToken }),
        });

        const result = await res.json().catch(() => ({}));

        if (!res.ok) {
          if (res.status === 429) {
            showLoginError("Too many login attempts. Please try again in 15 minutes.");
          } else if (res.status === 423) {
            showLoginError("This account is temporarily locked due to too many failed attempts. Please try again later.");
          } else if (result && result.error) {
            showLoginError(formatServerError(result, "Login failed."));
          } else {
            showLoginError("Invalid email/password combination");
          }

          if (window.grecaptcha) {
            try { grecaptcha.reset(); } catch (_) {}
          }
          return;
        }

        if (result.redirectTo) {
          window.location.href = result.redirectTo;
          return;
        }

        if (!result.user || !result.user.user_id) {
          showLoginError("Invalid email/password combination");
          if (window.grecaptcha) {
            try { grecaptcha.reset(); } catch (_) {}
          }
          return;
        }

        const user = result.user;
        localStorage.setItem("user", JSON.stringify(user));
        localStorage.setItem("user_id", user.user_id);

        window.location.href = "/welcome";
      } catch (err) {
        console.error("Login error:", err);
        showLoginError("Unable to connect. Please try again.");
        if (window.grecaptcha) {
          try { grecaptcha.reset(); } catch (_) {}
        }
      }
    });
  </script>
</body>
</html>
